name: Windows Candle worker

# Compiles AND tests the Rust GPU worker with the native candle (Windows/NVIDIA)
# engines (candle-gen) linked in — the off-Mac counterpart to macos-mlx.yml. The
# candle-gated worker code lives under
# `#[cfg(all(not(target_os = "macos"), feature = "backend-candle"))]`, so neither
# the Linux `parity` job (check.yml, no backend-candle) nor the macOS lane (mlx
# only) ever exercises it. The hosted `build-windows` desktop job COMPILES the
# candle sidecar but runs no worker tests, and server-candle-linux.yml is
# `workflow_dispatch`-only and compile-only. So before this lane, the
# candle-gated drift guard + sampler-knob + engine-map unit tests were validated
# ONLY by hand on the dev box — which let a stale candle test rot red on main
# undetected (sc-5495 → sc-7475; PR #865). This job closes that gap by actually
# RUNNING `cargo test --features backend-candle` on every candle-touching PR.
#
# It also compile-checks the desktop candle SIDECAR here
# (`cargo check -p sceneworks-rust-api --features backend-candle`): the hosted
# desktop-windows.yml lane stopped compiling it on PRs (the full candle/CUDA build
# moved to release/main-only, to keep every PR off the ~20–50 min hosted build).
# This warm box already has CUDA + an incremental target dir, so it's the cheap
# place to catch a candle sidecar build break on the PR instead of at release-tag
# time. (embed-web is left off — it needs a built web bundle; see the step comment.)
#
# RUNS ON A SELF-HOSTED Windows + NVIDIA (CUDA) RUNNER (label `cuda`). GitHub's
# hosted windows runners have no GPU and only compile; a real candle build also
# needs the box's MSVC 14.44 BuildTools toolset (CUDA 12.9's nvcc rejects VS2026's
# 14.51, sc-3676). The runner reuses its `_work` target dir, so candle compiles
# once and is incremental across runs. The real-weight GPU smokes stay `#[ignore]`d
# (the ~logic tests run driver-free); add `-- --ignored` by hand for a GPU pass.
#
# Runner prerequisites: Windows 11 + NVIDIA driver, CUDA Toolkit 12.9, VS2022
# BuildTools (MSVC 14.44), a Rust toolchain, registered with the `cuda` label.
#
# SECURITY: this repo is PUBLIC, and GitHub warns against running self-hosted
# runners for public repos because a fork PR could execute arbitrary code on the
# runner. The job-level `if:` below restricts execution to same-repo branches, so
# fork PRs never run here (mirrors macos-mlx.yml). Keep "Require approval for all
# external contributors' workflows" enabled in the repo Actions settings as
# defense in depth.

on:
  push:
    branches: [main]
    paths: &candle_paths
      - "crates/**"
      - "apps/rust-worker/**"
      - "apps/rust-api/**"
      # The builtin model catalog is include_str!'d into the worker and read by the
      # `manifest_menu_is_subset_of_descriptor` drift guard, so a manifest edit can
      # turn the candle suite red — gate on it.
      - "config/manifests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/windows-candle.yml"
  pull_request:
    branches: [main]
    paths: *candle_paths
  workflow_dispatch:

# Cancel superseded PR runs, but never cancel a main-push run: this lane is the
# ONLY thing that compiles the candle-gated worker code, so a main commit whose
# run is killed carries no candle verdict at all and a later break is misattributed
# to the next commit (sc-12399 — 8 of 30 main runs cancelled over one 37h window).
#
# The group KEY is what does the work here, not just cancel-in-progress. GitHub
# allows at most ONE pending run per concurrency group and cancels the previously
# pending run when a new one queues, so keying main on `github.ref` would still
# drop the middle commit of any 3+ merge burst (A runs, B pends, C evicts B) even
# with cancel-in-progress off. Keying main on `github.sha` puts every commit in its
# own group, where nothing can evict it; runs then serialize on the single
# self-hosted box instead. Do NOT collapse this back to `group: ...${{ github.ref }}`.
#
# Cost is bounded and was measured before landing: the lane is ~4.2m median (p90
# 4.5m) and the box sits ~12% utilized, so restoring the cancelled main runs adds
# ~34m of box time per ~37h (≈12% -> ≈13% utilization). `queue: max` would be the
# other way to do this, but it cannot combine with `cancel-in-progress: true`,
# which the PR side still wants.
concurrency:
  group: windows-candle-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  candle-worker:
    # Same-repo only — never execute untrusted fork code on the self-hosted runner.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: [self-hosted, Windows, X64, cuda]
    env:
      # Native sm_120 (Blackwell) — this runner IS the RTX PRO 6000 box; nvcc emits
      # SASS directly (no load-time JIT). compute_80 PTX would also forward-JIT.
      CUDA_COMPUTE_CAP: "120"
      CARGO_NET_OFFLINE: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      # sc-13166: point this lane at the REAL rustup toolchain bin and prepend it to
      # PATH, so cargo/rustc/clippy never dispatch through the fragile
      # %USERPROFILE%\.cargo\bin proxies (0-byte symlinks -> rustup.exe that go dangling
      # when rustup self-updates or its rustup.exe is deleted, or that fail to launch as
      # symlinks in the runner's Windows-service context — both surface as the cryptic
      # Windows ERROR_NO_ASSOCIATION at `cargo fetch` and turned every PR red, forcing
      # admin-override merges). The action fails loudly with an actionable message if no
      # usable toolchain is installed. See .github/actions/prepare-rust-runner.
      - uses: ./.github/actions/prepare-rust-runner
      - name: Fetch the private inference release
        env:
          CARGO_NET_OFFLINE: "false"
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: "url.https://x-access-token:${{ secrets.SCENEWORKS_INFERENCE_READ_TOKEN }}@github.com/SceneWorks/inference.insteadOf"
          GIT_CONFIG_VALUE_0: "https://github.com/SceneWorks/inference"
        run: cargo fetch --locked
      # No rust-toolchain action: the self-hosted box has rustup + the repo's
      # `rust-toolchain.toml`-pinned toolchain (incl. clippy) pre-installed, and the
      # action's bash step breaks here — `bash` resolves to the box's WSL stub, not
      # Git Bash. cargo in-repo auto-selects the pinned toolchain.
      # nvcc needs the MSVC 14.44 host compiler (NOT VS2026 14.51, which CUDA 12.9
      # rejects). Load the BuildTools vcvars in-shell, then build+test in the same
      # cmd invocation so the toolchain env survives (each step is a fresh shell).
      - name: Test the candle GPU worker (backend-candle)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          set NVCC_CCBIN=%VCToolsInstallDir%bin\Hostx64\x64
          cargo test -p sceneworks-worker --features backend-candle
      # PR guard for the desktop candle SIDECAR the hosted lane no longer builds on
      # PRs (see header). `cargo check` runs the build scripts (incl. the nvcc kernel
      # compile) and typechecks the full graph, so a candle sidecar build break is
      # caught on the PR — cheap here on the warm, CUDA-equipped box.
      #
      # NB: `embed-web` is intentionally OMITTED. It embeds apps/web/dist via
      # rust-embed (with `debug-embed`, so it embeds at compile time even under
      # `cargo check`), which requires a built web bundle — this lane never runs a
      # web build, so including it fails with "no `get` on WebAssets". embed-web is
      # orthogonal to candle (static-serving glue) and is compiled on the push:main /
      # release.yml package builds, where web/dist exists. (Release-only codegen/link
      # breaks also still surface first in those builds.)
      - name: Check the candle sidecar builds (rust-api, backend-candle)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          set NVCC_CCBIN=%VCToolsInstallDir%bin\Hostx64\x64
          cargo check -p sceneworks-rust-api --features backend-candle
      - name: Clippy (candle worker)
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          set NVCC_CCBIN=%VCToolsInstallDir%bin\Hostx64\x64
          cargo clippy -p sceneworks-worker --features backend-candle --all-targets -- -D warnings
