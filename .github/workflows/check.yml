name: Check

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r apps/api/requirements.txt httpx==0.28.1 "pillow>=12.0.0,<13"
      - name: Build Rust API before parity tests
        run: cargo build -q -p sceneworks-rust-api
      - name: Run API parity tests
        env:
          SCENEWORKS_REQUIRE_CARGO_PARITY: "1"
        run: python -m pytest -q -m parity --strict-markers
