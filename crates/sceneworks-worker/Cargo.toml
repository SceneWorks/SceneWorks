[package]
name = "sceneworks-worker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false

[dependencies]
# Cross-process advisory file lock (flock) serializing the manifest read→merge→write
# in manifest.rs. The default utility pool is 4 SEPARATE PROCESSES, so an in-process
# mutex can't stop two parallel installs from clobbering each other's manifest entry
# (F-041 / sc-8843). Already the workspace's file-lock choice (apps/rust-api).
fs2 = "0.4"
futures-util = "0.3"
glob = "0.3"
# PNG encoding for generated image assets (epic 3018, sc-3020). png-only keeps the
# dependency small and cross-platform (the image-job pipeline + its tests run on every
# platform; only real MLX inference is macOS-gated).
# png to encode generated assets (sc-3020); jpeg/webp to decode reference/source
# images for the FLUX.2 edit path (sc-3029) — uploads aren't only PNG.
image = { version = "0.25", default-features = false, features = ["png", "jpeg", "webp"] }
# CPU raster for DWPose skeleton rendering (epic 3018, sc-3028): filled polygons
# (rotated-ellipse limbs), circles (joints/points), for the Z-Image strict-pose
# ControlNet. Pure-Rust + cross-platform (the renderer + its tests run everywhere;
# only the MLX control generation is macOS-gated). Pinned to the image 0.25 line.
imageproc = { version = "0.25", default-features = false }
nix = { version = "0.29", default-features = false, features = ["process", "signal"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "stream"] }
sceneworks-core = { path = "../sceneworks-core" }
# Backend-neutral inference contracts; pinned with both platform bundles to one canonical commit.
sceneworks-gen-core = { git = "https://github.com/SceneWorks/inference", rev = "15895a90b345693e48593b7d6772f394758ae642" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.13"
tracing = { workspace = true }
tokio = { version = "1.40", features = ["fs", "io-util", "macros", "process", "rt-multi-thread", "signal", "time"] }
uuid = { version = "1.11", features = ["v4"] }

[dev-dependencies]
axum = "0.7"
tower = { version = "0.5", features = ["util"] }
# Dev-only stdout subscriber so the residency/fit-gate tests can surface their `tracing::info!`
# events under --nocapture (e.g. `mlx_sequential_residency_selected`). sc-10863.
tracing-subscriber = { workspace = true }
# sc-6541 closed-loop study: the LoRA eval harness (test-only, src/lora_eval_harness.rs) reuses
# the canonical Dataset Doctor blur measurement (`scalars_from_image(..).blur_variance`) for the
# output-sharpness Y axis. GPU-free path crate (image/imageproc/core), builds anywhere; dev-only
# so it never enters the worker binary.
sceneworks-image-quality = { path = "../sceneworks-image-quality" }

[features]
# Native Candle inference stays opt-in because CUDA toolchain/runtime requirements do not belong in
# the ordinary desktop build. The bundle owns the complete provider and LLM composition.
backend-candle = ["dep:runtime-cuda", "dep:ort", "dep:zip"]

[target.'cfg(target_os = "macos")'.dependencies]
# DWPose whole-body pose detection in Rust (epic 3482, sc-3487): RTMW (yolox_m +
# rtmw-dw-x-l) via onnxruntime with the CoreML execution provider, replacing the
# Python rtmlib `pose_detect` path so the Pose Library "create from photo" flow +
# InstantID pose conditioning keep working on a Python-free Mac. macOS-only (the
# Python rtmlib path stays the Win/Linux backend); `download-binaries` pulls a
# prebuilt onnxruntime that includes the CoreML EP. `zip` unpacks the openmmlab
# weight bundles on first use (download-on-first-use parity with rtmlib). The spike
# (docs/sc-3487/spike-findings.md) validated sub-pixel keypoint parity + matched
# latency vs the shipped detector.
# `load-dynamic` so the onnxruntime dylib is dlopen'd at runtime from
# `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like SCENEWORKS_FFMPEG) — this is
# robust under app-bundle relocation, unlike build-time linking + rpath.
# `download-binaries` still fetches a CoreML-enabled onnxruntime at build time so the
# desktop packager (build-sidecar.mjs) has a dylib to stage and dev runs work.
ort = { version = "=2.0.0-rc.12", features = ["coreml", "load-dynamic", "download-binaries"] }
zip = { version = "2", default-features = false, features = ["deflate"] }
# Canonical Apple inference composition. Bespoke provider APIs are re-exported by the bundle.
runtime-macos = { git = "https://github.com/SceneWorks/inference", rev = "15895a90b345693e48593b7d6772f394758ae642" }
# Retained direct dependency: SceneWorks' native person detector uses MLX tensor primitives.
mlx-rs = { package = "pmetal-mlx-rs", git = "https://github.com/michaeltrefry/mlx-rs", rev = "932beb4e60db44d378ffa1fe648defea59b5cbd0" }

[target.'cfg(not(target_os = "macos"))'.dependencies]
# Canonical NVIDIA inference composition; enabled only by `backend-candle`.
runtime-cuda = { git = "https://github.com/SceneWorks/inference", rev = "15895a90b345693e48593b7d6772f394758ae642", optional = true }
# DWPose whole-body pose detection off-Mac (sc-5496, epic 5482) — the Windows/Linux/CUDA sibling of the
# macOS `ort`/CoreML path (sc-3487). Same RTMW detector (yolox_m + rtmw-dw-x-l) and the same pure
# pre/post math in `pose_jobs.rs`; only the execution provider differs (CUDA here, CoreML on Mac), with
# a CPU fallback. `optional` + pulled in by `backend-candle` (the off-Mac GPU-worker feature) so the
# default non-candle sidecar that `desktop-windows.yml` builds never downloads onnxruntime — the candle
# GPU worker advertises `pose_detect`, while the Python rtmlib path stays a co-resident fallback (retired
# wholesale in Phase 7, epic 5483). `cuda` enables the CUDA EP; `load-dynamic` dlopens the onnxruntime
# dylib at runtime from `ORT_DYLIB_PATH` (set by the desktop `setup.rs`, like the Mac path); and
# `download-binaries` fetches a CUDA-enabled onnxruntime at build time so dev runs + the candle packager
# have a dylib to stage. `zip` unpacks the openmmlab weight bundles (download-on-first-use parity with
# rtmlib), shared with the Mac path — optional + candle-gated off-Mac for the same reason as `ort`.
ort = { version = "=2.0.0-rc.12", features = ["cuda", "load-dynamic", "download-binaries"], optional = true }
zip = { version = "2", default-features = false, features = ["deflate"], optional = true }

[lints]
workspace = true
